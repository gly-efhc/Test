name: canon

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  canon:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: efhc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d efhc_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      # SQLAlchemy URLs
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/efhc_test
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/efhc_test
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/efhc_test

      # Psycopg-native URL for sanity checks (psycopg.connect)
      PSYCOPG_URL: postgresql://postgres:postgres@localhost:5432/efhc_test

      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Debug repo root listing
        run: |
          echo "REF=$GITHUB_REF"
          echo "SHA=$GITHUB_SHA"
          pwd
          ls -la

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Guard DB profile (Postgres-only)
        run: |
          python - <<'PY'
          import os, sys
          url = os.environ.get("DATABASE_URL")
          if not url:
              print("ERROR: DATABASE_URL is empty")
              sys.exit(2)
          if url.lower().startswith("sqlite://"):
              print("ERROR: SQLite is forbidden by CANON")
              sys.exit(3)
          print("OK: Postgres-only profile")
          PY

      - name: Ensure efhc.zip exists in repo root
        run: |
          test -f efhc.zip || (echo "ERROR: efhc.zip not found in repo root" && exit 1)
          ls -la efhc.zip

      - name: Unzip efhc.zip
        run: |
          rm -rf extracted
          mkdir -p extracted
          unzip -q efhc.zip -d extracted
          find extracted -maxdepth 12 -name ".npmrc" -print -delete || true

      - name: Debug extracted listing
        run: |
          ls -la extracted | sed -n '1,200p'
          test -f extracted/backend/alembic.ini || (echo "ERROR: extracted/backend/alembic.ini missing" && exit 1)
          test -f extracted/backend/requirements.txt || (echo "ERROR: extracted/backend/requirements.txt missing" && exit 1)

      - name: Backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r extracted/backend/requirements.txt
          # IMPORTANT: no -U (no drifting pytest stack)
          pip install pytest pytest-asyncio alembic "psycopg[binary]" PyJWT

      - name: compileall (backend)
        run: |
          python -m compileall extracted/backend -q

      - name: Alembic upgrade head (Postgres-only)
        run: |
          cd extracted/backend
          alembic -c alembic.ini upgrade head

      - name: Sanity DB objects after alembic (core/admin)
        run: |
          python - <<'PY'
          import os, sys
          import psycopg

          url = os.environ["PSYCOPG_URL"]
          required = [
              "efhc_core.users",
              "efhc_core.withdraw_requests",
              "efhc_admin.efhc_sale_packages",
          ]

          missing = []
          with psycopg.connect(url) as conn:
              with conn.cursor() as cur:
                  for name in required:
                      cur.execute("SELECT to_regclass(%s)", (name,))
                      if cur.fetchone()[0] is None:
                          missing.append(name)

          if missing:
              print("ERROR: required tables missing after alembic:")
              for t in missing:
                  print(" -", t)
              sys.exit(2)

          print("OK: required tables exist after alembic")
          PY

      - name: pytest -q (Postgres-only)
        run: |
          cd extracted
          pytest -q

      - name: Frontend lockfile checks + build
        run: |
          set -e
          test -f extracted/frontend/package-lock.json || (echo "ERROR: package-lock.json missing" && exit 1)

          if grep -RInE "applied-caas-gateway|internal\.api\.openai|artifactory" extracted/frontend/package-lock.json; then
            echo "ERROR: forbidden registry markers in package-lock.json"
            exit 1
          fi

          cd extracted/frontend
          npm ci
          npm run build

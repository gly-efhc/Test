name: canon

on:
  push:
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  canon:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: efhc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d efhc_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      DB_SCHEMA_CORE: efhc_core
      DB_SCHEMA_ADMIN: efhc_admin

      DATABASE_URL: >-
        postgresql+psycopg://postgres:postgres@localhost:5432/efhc_test
      SYNC_DATABASE_URL: >-
        postgresql+psycopg://postgres:postgres@localhost:5432/efhc_test
      ASYNC_DATABASE_URL: >-
        postgresql+asyncpg://postgres:postgres@localhost:5432/efhc_test

      PSYCOPG_URL: postgresql://postgres:postgres@localhost:5432/efhc_test

      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Init artifacts
        run: |
          rm -rf ci_artifacts extracted
          mkdir -p ci_artifacts

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Versions
        run: |
          {
            echo "ref=$GITHUB_REF"
            echo "sha=$GITHUB_SHA"
            python -V
            python -m pip -V
            node -v
            npm -v
          } | tee ci_artifacts/01_versions.txt

      - name: Guard DB profile
        run: |
          python - <<'PY' | tee ci_artifacts/02_db_guard.txt
          import os, sys
          url = os.environ.get("DATABASE_URL", "")
          if not url:
              print("ERROR: DATABASE_URL empty")
              sys.exit(2)
          if url.lower().startswith("sqlite://"):
              print("ERROR: sqlite forbidden")
              sys.exit(3)
          print("OK: postgres-only")
          PY

      - name: Ensure efhc.zip
        run: |
          test -f efhc.zip || \
            (echo "ERROR: efhc.zip missing" && exit 1)
          ls -la efhc.zip | tee ci_artifacts/03_efhc_zip_ls.txt

      - name: Unzip efhc.zip
        run: |
          mkdir -p extracted
          unzip -q efhc.zip -d extracted
          find extracted -maxdepth 12 -name ".npmrc" \
            -print -delete || true
          test -d extracted/backend || \
            (echo "ERROR: extracted/backend missing" && exit 1)
          test -f extracted/backend/alembic.ini || exit 1
          test -f extracted/backend/requirements.txt || exit 1

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r extracted/backend/requirements.txt
          pip install pytest pytest-asyncio "psycopg[binary]" \
            alembic PyJWT
          pip freeze | sort | tee ci_artifacts/04_pip_freeze.txt

      - name: compileall backend
        run: |
          python -m compileall extracted/backend -q \
            | tee ci_artifacts/05_compileall.txt

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql --version | tee ci_artifacts/06_psql_version.txt

      - name: PSQL diag pre
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -p 5432 -U postgres -d efhc_test \
            -v ON_ERROR_STOP=1 \
            -c "SELECT current_database() AS db;" \
            -c "SHOW search_path;" \
            -c "SELECT nspname FROM pg_namespace ORDER BY 1;" \
            -c "SELECT count(*) AS tables FROM pg_tables;" \
            | tee ci_artifacts/07_psql_pre.txt

      - name: Alembic upgrade head
        run: |
          cd extracted/backend
          python -m alembic -c alembic.ini upgrade head \
            2>&1 | tee ../../ci_artifacts/08_alembic_upgrade.txt

      - name: Sanity required tables
        run: |
          python - <<'PY' | tee ci_artifacts/09_sanity.txt
          import os, sys
          import psycopg

          url = os.environ["PSYCOPG_URL"]
          req = [
              "efhc_core.users",
              "efhc_core.withdraw_requests",
              "efhc_admin.efhc_sale_packages",
          ]

          def ok(cur, name: str) -> bool:
              cur.execute("SELECT to_regclass(%s)", (name,))
              return cur.fetchone()[0] is not None

          missing = []
          hints = []
          with psycopg.connect(url) as conn:
              with conn.cursor() as cur:
                  cur.execute("SELECT current_database()")
                  print("db=", cur.fetchone()[0])
                  cur.execute("SHOW search_path")
                  print("search_path=", cur.fetchone()[0])

                  for name in req:
                      if not ok(cur, name):
                          missing.append(name)
                          t = name.split(".", 1)[1]
                          pub = f"public.{t}"
                          if ok(cur, pub):
                              hints.append(f"{name} as {pub}")

          if missing:
              print("ERROR: missing required tables:")
              for t in missing:
                  print(" -", t)
              if hints:
                  print("HINTS:")
                  for h in hints:
                      print(" -", h)
              sys.exit(2)

          print("OK: required tables exist")
          PY

      - name: PSQL diag post
        if: always()
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -p 5432 -U postgres -d efhc_test \
            -v ON_ERROR_STOP=1 \
            -c "SELECT current_database() AS db;" \
            -c "SHOW search_path;" \
            -c "SELECT schemaname, tablename FROM pg_tables \
                ORDER BY 1,2;" \
            -c "SELECT to_regclass('efhc_core.users') AS core_users,
                       to_regclass('public.users') AS pub_users;" \
            | tee ci_artifacts/10_psql_post.txt

      - name: pg_dump schemas (only on failure)
        if: failure()
        run: |
          out="ci_artifacts/11_pg_dump_schemas.sql"
          PGPASSWORD=postgres pg_dump \
            -h localhost -p 5432 -U postgres -d efhc_test \
            --schema-only \
            --schema=efhc_core \
            --schema=efhc_admin \
            --schema=public \
            --no-owner \
            --no-privileges \
            > "$out"
          gzip -f "$out"

      - name: pytest -q
        if: always()
        run: |
          cd extracted
          PYTHONPATH=backend pytest -q \
            2>&1 | tee ../ci_artifacts/12_pytest.txt

      - name: Frontend build
        if: always()
        run: |
          test -f extracted/frontend/package-lock.json || exit 1
          if grep -RInE \
            "applied-caas-gateway|internal\.api\.openai|artifactory" \
            extracted/frontend/package-lock.json; then
            echo "ERROR: forbidden registry markers"
            exit 1
          fi
          cd extracted/frontend
          npm ci 2>&1 | tee ../../ci_artifacts/13_npm_ci.txt
          npm run build 2>&1 | tee ../../ci_artifacts/14_npm_build.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci_artifacts
          path: ci_artifacts
          retention-days: 14
